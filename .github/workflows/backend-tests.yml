name: Backend — Pruebas y Cobertura

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
      - feat/**
      - chore/**
      - fix/**
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test-and-coverage:
    name: Pruebas .NET + Code Coverage
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # ── 2. .NET 9 SDK ─────────────────────────────────────────────
      - name: Configurar .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ── 3. Restaurar herramientas locales (ReportGenerator, etc.) ──
      - name: Restaurar herramientas dotnet
        run: dotnet tool restore

      # ── 4. Restaurar dependencias ──────────────────────────────────
      - name: Restaurar paquetes NuGet
        run: dotnet restore backend/SistemaServicios.sln

      # ── 5. Build ───────────────────────────────────────────────────
      - name: Compilar solución completa
        run: dotnet build backend/SistemaServicios.sln --no-restore --configuration Release

      # ── 6. Limpiar resultados de cobertura previos ─────────────────
      # Evita que archivos XML de ejecuciones anteriores contaminen el merge
      - name: Limpiar directorio de cobertura
        run: rm -rf ./coverage && mkdir -p ./coverage

      # ── 7. Pruebas + cobertura ─────────────────────────────────────
      - name: Ejecutar pruebas con recolección de cobertura
        env:
          JWT_KEY: "CIKeyParaGithubActionsTestingPurposesOnly!"
          JWT_ISSUER: "TestIssuer"
          JWT_AUDIENCE: "TestAudience"
          JWT_EXPIRES_MINUTES: "60"
          DB_HOST: "localhost"
          DB_PORT: "5432"
          DB_NAME: "fake"
          DB_USER: "fake"
          DB_PASSWORD: "fake"
          ALLOWED_ORIGINS: "http://localhost:3000"
          SMTP_HOST: "dummy-host"
          SMTP_PORT: "587"
          SMTP_USER: "dummy@test.com"
          SMTP_PASSWORD: "dummy-pass"
          SMTP_FROM: "dummy@test.com"
        run: |
          dotnet test backend/SistemaServicios.sln \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --settings backend/SistemaServicios.Tests/coverlet.runsettings \
            --results-directory ./coverage \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal"

      # ── 8. Generar reporte HTML ────────────────────────────────────
      - name: Generar reporte HTML de cobertura
        run: |
          dotnet tool run reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"./coverage/report" \
            -reporttypes:"Html;TextSummary;Cobertura" \
            -assemblyfilters:"+SistemaServicios.API" \
            -classfilters:"-*Migrations*;-*AppDbContext*;-*Program*"

      # ── 9. Mostrar resumen en el log y en el Job Summary ──────────
      - name: Mostrar resumen de cobertura
        run: |
          cat ./coverage/report/Summary.txt
          echo "## Resumen de Cobertura" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ./coverage/report/Summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 10. Publicar reporte como artefacto ────────────────────────
      - name: Publicar reporte HTML como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_number }}
          path: ./coverage/report
          retention-days: 30

      # ── 11. Publicar resultados de pruebas ─────────────────────────
      - name: Publicar resultados .trx como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: ./coverage/**/*.trx
          retention-days: 14
